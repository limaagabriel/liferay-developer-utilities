schema: spec-driven
context: |
  IMPORTANT: Before running any `openspec` CLI command, always run `nvm use --lts` first to ensure the openspec binary is available.

  This is a CLI tool to automate some common tasks while working with liferay-portal
  It includes tools to manage worktrees, bundles, tests, and more

  It requires the following setup:
  - A project directory, which will contain the master branch and the worktrees
  - A bundles directory, which will contain the bundles to be tested
  It should be flexible, allowing users to specify the paths for these directories in a config file or via command-line arguments.

  Also, it shouldn't require a lot of dependencies, it should work fine in Linux and MacOS environments without needing to install a lot of additional software.

  It should be developer-friendly, with clear documentation and error messages.
  Also, it should have a very clear and intuitive CLI interface, with commands and options that are easy to understand and use.
rules:
  tasks:
    - Always add a task to check if the help pages should be updated.  

